# Développement / démo local : UI sur http://localhost:8080 , API sur http://localhost:4000
# Le front proxy /api vers le conteneur api (pas besoin de VITE_API_BASE).
#
# Démarrage : docker compose up --build
# Azure : voir .github/workflows/azure-deploy.yml (build ACR + Container Apps).

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: mousafar_root
      MYSQL_DATABASE: el_mousafar
      MYSQL_USER: mousafar
      MYSQL_PASSWORD: mousafar_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build:
      context: ./backend
    image: el-mousafar-api:local
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: mousafar
      MYSQL_PASSWORD: mousafar_password
      MYSQL_DATABASE: el_mousafar
      MYSQL_SSL: "false"
    depends_on:
      - mysql

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ""
        DEPLOY_MODE: compose
    image: el-mousafar-web:local
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  mysql_data:
