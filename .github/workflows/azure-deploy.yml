name: Deploy El Mousafar to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.AZURE_ACR_NAME != '' && vars.AZURE_RESOURCE_GROUP != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Container Apps extension
        run: az extension add --name containerapp --upgrade 2>/dev/null || true

      - name: Build & push API image (ACR Tasks)
        run: |
          set -eux
          TAG='${{ github.sha }}'
          az acr build -r "${{ vars.AZURE_ACR_NAME }}" \
            --platform linux/amd64 \
            -t "el-mousafar-api:${TAG}" \
            -t "el-mousafar-api:latest" \
            ./backend

      - name: Build & push Web image (ACR Tasks)
        run: |
          set -eux
          TAG='${{ github.sha }}'
          az acr build -r "${{ vars.AZURE_ACR_NAME }}" \
            --platform linux/amd64 \
            --build-arg "DEPLOY_MODE=standalone" \
            --build-arg "VITE_API_BASE=${{ vars.VITE_API_BASE }}" \
            -t "el-mousafar-web:${TAG}" \
            -t "el-mousafar-web:latest" \
            ./frontend

      - name: Get ACR login server
        id: acr
        run: |
          echo "login=$(az acr show -n '${{ vars.AZURE_ACR_NAME }}' --query loginServer -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Deploy API Container App
        # OTP e-mail réel : vars SMTP_* + EMAIL_FROM ; secret SMTP_PASS. Laisser EMAIL_SIMULATE vide ou 0 (définir var repo à 0 pour forcer la prod).
        if: ${{ vars.CONTAINER_APP_API != '' }}
        run: |
          set -eux
          TAG='${{ github.sha }}'
          az containerapp update \
            --name "${{ vars.CONTAINER_APP_API }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ steps.acr.outputs.login }}/el-mousafar-api:${TAG}" \
            --set-env-vars \
              NODE_ENV=production \
              PORT=4000 \
              PUBLIC_APP_URL="${{ vars.PUBLIC_APP_URL }}" \
              ADMIN_INVITE_SECRET="${{ secrets.ADMIN_INVITE_SECRET }}" \
              MYSQL_HOST="${{ vars.MYSQL_HOST }}" \
              MYSQL_PORT="${{ vars.MYSQL_PORT }}" \
              MYSQL_USER="${{ vars.MYSQL_USER }}" \
              MYSQL_PASSWORD="${{ secrets.MYSQL_PASSWORD }}" \
              MYSQL_DATABASE="${{ vars.MYSQL_DATABASE }}" \
              MYSQL_SSL="${{ vars.MYSQL_SSL }}" \
              SMTP_HOST="${{ vars.SMTP_HOST }}" \
              SMTP_PORT="${{ vars.SMTP_PORT }}" \
              SMTP_SECURE="${{ vars.SMTP_SECURE }}" \
              SMTP_USER="${{ vars.SMTP_USER }}" \
              SMTP_PASS="${{ secrets.SMTP_PASS }}" \
              EMAIL_FROM="${{ vars.EMAIL_FROM }}" \
              EMAIL_SIMULATE="${{ vars.EMAIL_SIMULATE || '0' }}"

      - name: Deploy Web Container App
        if: ${{ vars.CONTAINER_APP_WEB != '' }}
        run: |
          set -eux
          TAG='${{ github.sha }}'
          az containerapp update \
            --name "${{ vars.CONTAINER_APP_WEB }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ steps.acr.outputs.login }}/el-mousafar-web:${TAG}"
