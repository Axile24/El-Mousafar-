name: Bootstrap Azure Student Infra

on:
  workflow_dispatch:
    inputs:
      location:
        description: Azure region (example swedencentral)
        required: true
        default: swedencentral
      resource_group:
        description: Resource group name
        required: true
        default: rg-el-mousafar
      aca_env_name:
        description: Container Apps environment name
        required: true
        default: cae-el-mousafar
      acr_name:
        description: ACR name (lowercase letters/numbers only)
        required: true
        default: elmousafaracr
      api_app_name:
        description: API Container App name
        required: true
        default: el-mousafar-api
      web_app_name:
        description: Web Container App name
        required: true
        default: el-mousafar-web

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Container Apps extension
        run: az extension add --name containerapp --upgrade 2>/dev/null || true

      - name: Create Resource Group
        run: |
          az group create \
            --name "${{ github.event.inputs.resource_group }}" \
            --location "${{ github.event.inputs.location }}"

      - name: Create ACR
        run: |
          az acr create \
            --name "${{ github.event.inputs.acr_name }}" \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --sku Basic \
            --admin-enabled false

      - name: Create Container Apps environment
        run: |
          az containerapp env create \
            --name "${{ github.event.inputs.aca_env_name }}" \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --location "${{ github.event.inputs.location }}"

      - name: Create API app (placeholder image)
        run: |
          az containerapp create \
            --name "${{ github.event.inputs.api_app_name }}" \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --environment "${{ github.event.inputs.aca_env_name }}" \
            --image mcr.microsoft.com/k8se/quickstart:latest \
            --target-port 4000 \
            --ingress external \
            --cpu 0.25 \
            --memory 0.5Gi \
            --min-replicas 0 \
            --max-replicas 1

      - name: Create Web app (placeholder image)
        run: |
          az containerapp create \
            --name "${{ github.event.inputs.web_app_name }}" \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --environment "${{ github.event.inputs.aca_env_name }}" \
            --image mcr.microsoft.com/k8se/quickstart:latest \
            --target-port 80 \
            --ingress external \
            --cpu 0.25 \
            --memory 0.5Gi \
            --min-replicas 0 \
            --max-replicas 1

      - name: Enable managed identity on apps
        id: ids
        run: |
          API_PRINCIPAL=$(az containerapp identity assign \
            --name "${{ github.event.inputs.api_app_name }}" \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --query principalId -o tsv)

          WEB_PRINCIPAL=$(az containerapp identity assign \
            --name "${{ github.event.inputs.web_app_name }}" \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --query principalId -o tsv)

          ACR_ID=$(az acr show \
            --name "${{ github.event.inputs.acr_name }}" \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --query id -o tsv)

          echo "api_principal=$API_PRINCIPAL" >> "$GITHUB_OUTPUT"
          echo "web_principal=$WEB_PRINCIPAL" >> "$GITHUB_OUTPUT"
          echo "acr_id=$ACR_ID" >> "$GITHUB_OUTPUT"

      - name: Grant AcrPull role
        run: |
          az role assignment create \
            --assignee "${{ steps.ids.outputs.api_principal }}" \
            --role AcrPull \
            --scope "${{ steps.ids.outputs.acr_id }}"

          az role assignment create \
            --assignee "${{ steps.ids.outputs.web_principal }}" \
            --role AcrPull \
            --scope "${{ steps.ids.outputs.acr_id }}"

      - name: Print values to configure in GitHub Variables
        run: |
          API_FQDN=$(az containerapp show \
            --name "${{ github.event.inputs.api_app_name }}" \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --query properties.configuration.ingress.fqdn -o tsv)

          WEB_FQDN=$(az containerapp show \
            --name "${{ github.event.inputs.web_app_name }}" \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --query properties.configuration.ingress.fqdn -o tsv)

          echo "Set GitHub Variables:" \
            "AZURE_RESOURCE_GROUP=${{ github.event.inputs.resource_group }}" \
            "AZURE_ACR_NAME=${{ github.event.inputs.acr_name }}" \
            "CONTAINER_APP_API=${{ github.event.inputs.api_app_name }}" \
            "CONTAINER_APP_WEB=${{ github.event.inputs.web_app_name }}" \
            "VITE_API_BASE=https://$API_FQDN" \
            "PUBLIC_APP_URL=https://$WEB_FQDN"

          echo "Web URL: https://$WEB_FQDN"
          echo "API URL: https://$API_FQDN"
